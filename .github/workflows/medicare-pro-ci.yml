name: Medicare Pro CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'  # Todos los dias a las 6am UTC

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Ejecutar tests
        run: python -m pytest tests/ --tb=short -q
      - name: Verificar sintaxis
        run: |
          find . -name "*.py" -not -path "./nextgen_platform/*" -not -path "./_gestion_ganadera_senasa_work/*" -exec python -c "compile(open('{}',encoding='utf-8').read(),'{}','exec')" \;
          
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar secrets
        run: |
          ! grep -r "sb_secret_" --include="*.py" . | grep -v "security_checklist\|test_security_guardrails\|security_middleware"
      - name: Verificar imports
        run: python scripts/security_checklist.py

  auto-fix:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Auto cleanup backups viejos
        run: |
          # Mover backups de .streamlit/ a _backups_legacy/ (mayores a 7 dias)
          for f in .streamlit/backup_*.json; do
            [ -f "$f" ] && mv "$f" _backups_legacy/streamlit/ 2>/dev/null || true
          done
      - name: Commit auto-fix si hay cambios
        run: |
          git config user.name "Medicare Bot"
          git config user.email "bot@medicare-pro.app"
          git add -A
          git diff --staged --quiet || git commit -m "auto: cleanup diario backups"
          git push
