name: Medicare Pro CI/CD Completo

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 */6 * * *'  # Cada 6 horas
  workflow_dispatch:  # Manual trigger

jobs:
  # ============================================================
  # FASE 1: AUTO-HEALING COMPLETO
  # ============================================================
  auto-healing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: pip install -r requirements.txt 2>/dev/null || true
      - name: Ejecutar Auto-Healing
        run: python scripts/auto_healing.py
        continue-on-error: true
      - name: Subir reporte
        uses: actions/upload-artifact@v4
        with:
          name: auto-healing-report
          path: scripts/auto_healing_report.json

  # ============================================================
  # FASE 2: TESTEO COMPLETO
  # ============================================================
  test-full:
    needs: auto-healing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist
      - name: Tests unitarios
        run: python -m pytest tests/ --tb=short -q -x --timeout=60
        continue-on-error: true
      - name: Verificar sintaxis TODOS los archivos
        run: |
          find . -name "*.py" \
            -not -path "./nextgen_platform/*" \
            -not -path "./_gestion_ganadera_senasa_work/*" \
            -not -path "./.git/*" \
            -exec python -c "compile(open('{}',encoding='utf-8').read(),'{}','exec')" \; -print
      - name: Verificar imports core
        run: |
          for f in core/*.py views/*.py; do
            mod="${f%.py}"; mod="${mod//\//.}"
            python -c "import $mod" 2>/dev/null && echo "OK: $mod" || echo "FAIL: $mod"
          done

  # ============================================================
  # FASE 3: SEGURIDAD
  # ============================================================
  security-scan:
    needs: auto-healing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Buscar secrets expuestos
        run: |
          echo "=== BUSCANDO SECRETS ==="
          grep -rn "sb_secret_" --include="*.py" . | \
            grep -v "security_checklist" | \
            grep -v "test_security" | \
            grep -v "security_middleware" || echo "No se encontraron secrets expuestos"
      - name: Verificar archivos criticos
        run: |
          for f in main.py main_medicare.py core/auth.py core/database.py requirements.txt; do
            [ -f "$f" ] && echo "OK: $f" || echo "FALTANTE: $f"
          done

  # ============================================================
  # FASE 4: OPTIMIZACION
  # ============================================================
  optimization:
    needs: auto-healing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar tamanio archivos
        run: |
          echo "=== TAMANIO ARCHIVOS ==="
          find . -name "*.py" -not -path "./.git/*" -not -path "./nextgen_platform/*" -exec wc -l {} \; | sort -rn | head -10
          echo ""
          echo "=== BACKUPS TEMPORALES ==="
          find . -name "backup_*.json" -o -name "strong_recovery_*.json" | head -5
