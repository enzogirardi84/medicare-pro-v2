name: Medicare Pro CI/CD Completo + Auto-Fix

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  auto-heal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar base
        run: pip install -r requirements.txt 2>/dev/null || true
      - name: Auto-Healing scan
        run: python scripts/auto_healing.py || true
      - name: Auto-Fix (corrige problemas)
        run: python scripts/auto_fix.py || true
      - name: Commit auto-fixes si hay cambios
        run: |
          git config user.name "Medicare Bot"
          git config user.email "bot@medicare-pro.app"
          git add -A
          git diff --staged --quiet || git commit -m "auto-fix: correcciones automaticas $(date +'%Y-%m-%d')"
          git push || echo "No hay cambios para pushear"
      - name: Subir reportes
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            scripts/auto_healing_report.json
            scripts/auto_fix_report.json

  test:
    needs: auto-heal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: pip install -r requirements.txt pytest pytest-cov
      - name: Tests
        run: python -m pytest tests/ --tb=short -q -x --timeout=60 || true
      - name: Verificar sintaxis todos los archivos
        run: |
          find . -name "*.py" -not -path "./nextgen_platform/*" \
            -not -path "./_gestion_ganadera_senasa_work/*" \
            -not -path "./.git/*" \
            -exec python -c "compile(open('{}',encoding='utf-8').read(),'{}','exec')" \; 2>&1 | head -20
      - name: Metricas de codigo
        run: python -c "
import ast, os
total = 0
for root, dirs, files in os.walk('.'):
    dirs[:] = [d for d in dirs if d not in {'.git','nextgen_platform','_gestion_ganadera_senasa_work'}]
    for f in files:
        if f.endswith('.py'):
            total += 1
print(f'Total archivos .py: {total}')
"

  security:
    needs: auto-heal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secrets scan
        run: |
          echo "=== SECRETS SCAN ==="
          grep -rn "sb_secret_" --include="*.py" . \
            | grep -v "security_checklist\|test_security\|security_middleware\|auto_healing\|auto_script" \
            || echo "OK - No secrets expuestos"
      - name: Archivos criticos
        run: |
          for f in main.py main_medicare.py requirements.txt core/auth.py core/database.py; do
            [ -f "$f" ] && echo "OK: $f" || echo "FALTANTE: $f"
          done
