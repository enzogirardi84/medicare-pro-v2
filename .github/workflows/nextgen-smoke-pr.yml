name: nextgen-smoke-pr

on:
  pull_request:
    paths:
      - "nextgen_platform/**"
      - ".github/workflows/**"
      - ".github/actions/**"

concurrency:
  group: nextgen-smoke-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-nextgen:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: nextgen_platform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "nextgen_platform/requirements-dev.txt"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build/start stack and wait health
        uses: ./.github/actions/nextgen-stack-up
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
          healthcheck_url: http://localhost:8000/health
          max_attempts: "30"
          sleep_seconds: "3"

      - name: Run smoke integration contracts
        env:
          NEXTGEN_BASE_URL: http://localhost:8000
        run: |
          mkdir -p ci_artifacts
          python -m pytest tests/integration/test_auth_contract.py tests/integration/test_outbox_contract.py tests/integration/test_system_resilience_contract.py tests/integration/test_api_guardrails_contract.py -q --junitxml=ci_artifacts/smoke-junit.xml

      - name: Capture and upload docker logs on failure
        if: failure()
        uses: ./.github/actions/capture-docker-logs-on-failure
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
          artifact_path: ci_artifacts/smoke-docker-logs.txt
          artifact_name: nextgen-smoke-pr-failure-logs

      - name: Publish test summary
        if: always()
        uses: ./.github/actions/publish-junit-summary
        with:
          report_path: nextgen_platform/ci_artifacts/smoke-junit.xml
          title: Smoke Test Summary

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nextgen-smoke-pr-junit
          path: nextgen_platform/ci_artifacts/smoke-junit.xml

      - name: Shutdown stack
        if: always()
        uses: ./.github/actions/nextgen-stack-down
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
