name: nextgen-release-readiness

on:
  workflow_dispatch:
    inputs:
      run_full_contracts:
        description: "Run full contract suite (slower but stronger gate; includes import CSV + outbox scheduler)"
        required: true
        default: false
        type: boolean
      run_import_contract:
        description: "Run import CSV contract only (needs Celery worker). Ignored when run_full_contracts=true (already included)."
        required: true
        default: false
        type: boolean

concurrency:
  group: nextgen-release-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: nextgen_platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint workflows and actions
        uses: rhysd/actionlint@v1.7.7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "nextgen_platform/requirements-dev.txt"

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pip-audit bandit

      - name: Dependency vulnerability audit
        run: |
          pip-audit -r requirements-dev.txt

      - name: Static security scan (Bandit)
        run: |
          bandit -q -r apps/api/app

      - name: Build/start stack and wait health
        uses: ./.github/actions/nextgen-stack-up
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
          healthcheck_url: http://localhost:8000/health
          max_attempts: "30"
          sleep_seconds: "3"

      - name: Run smoke integration contracts
        env:
          NEXTGEN_BASE_URL: http://localhost:8000
        run: |
          mkdir -p ci_artifacts
          python -m pytest tests/integration/test_auth_contract.py tests/integration/test_outbox_contract.py tests/integration/test_system_resilience_contract.py tests/integration/test_api_guardrails_contract.py -q --junitxml=ci_artifacts/release-smoke-junit.xml

      - name: Run full integration contracts (optional)
        if: ${{ inputs.run_full_contracts }}
        env:
          NEXTGEN_BASE_URL: http://localhost:8000
        run: |
          python -m pytest tests/integration/test_auth_contract.py tests/integration/test_outbox_contract.py tests/integration/test_outbox_scheduler_contract.py tests/integration/test_import_csv_contract.py tests/integration/test_system_resilience_contract.py tests/integration/test_api_guardrails_contract.py -q --junitxml=ci_artifacts/release-full-junit.xml

      - name: Run import CSV contract only (optional)
        if: ${{ inputs.run_import_contract && !inputs.run_full_contracts }}
        env:
          NEXTGEN_BASE_URL: http://localhost:8000
        run: |
          mkdir -p ci_artifacts
          python -m pytest tests/integration/test_import_csv_contract.py -q --junitxml=ci_artifacts/release-import-junit.xml

      - name: Capture and upload docker logs on failure
        if: failure()
        uses: ./.github/actions/capture-docker-logs-on-failure
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
          artifact_path: ci_artifacts/release-readiness-docker-logs.txt
          artifact_name: nextgen-release-readiness-failure-logs

      - name: Publish smoke summary
        if: always()
        uses: ./.github/actions/publish-junit-summary
        with:
          report_path: nextgen_platform/ci_artifacts/release-smoke-junit.xml
          title: Release Readiness Smoke Summary

      - name: Publish full summary
        if: ${{ always() && inputs.run_full_contracts }}
        uses: ./.github/actions/publish-junit-summary
        with:
          report_path: nextgen_platform/ci_artifacts/release-full-junit.xml
          title: Release Readiness Full Contracts Summary

      - name: Publish import-only summary
        if: ${{ always() && inputs.run_import_contract && !inputs.run_full_contracts }}
        uses: ./.github/actions/publish-junit-summary
        with:
          report_path: nextgen_platform/ci_artifacts/release-import-junit.xml
          title: Release Readiness Import CSV Summary

      - name: Upload readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextgen-release-readiness-artifacts
          path: |
            nextgen_platform/ci_artifacts/release-smoke-junit.xml
            nextgen_platform/ci_artifacts/release-full-junit.xml
            nextgen_platform/ci_artifacts/release-import-junit.xml
            nextgen_platform/ci_artifacts/release-readiness-docker-logs.txt
          if-no-files-found: ignore

      - name: Shutdown stack
        if: always()
        uses: ./.github/actions/nextgen-stack-down
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
