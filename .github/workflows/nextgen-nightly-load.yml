name: nextgen-nightly-load

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly-load:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: nextgen_platform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare report directory
        run: mkdir -p benchmark_results

      - name: Build/start stack and wait health
        uses: ./.github/actions/nextgen-stack-up
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
          healthcheck_url: http://localhost:8000/ready
          max_attempts: "40"
          sleep_seconds: "3"

      - name: Run k6 mixed benchmark
        run: |
          docker run --rm --network host \
            -v "$PWD:/work/nextgen_platform" \
            -w /work/nextgen_platform \
            grafana/k6 run tests/load/k6_mixed_scale.js \
            --env BASE_URL=http://localhost:8000 \
            --summary-export benchmark_results/nightly-summary.json

      - name: Summarize benchmark
        run: python scripts/summarize_benchmark.py benchmark_results/nightly-summary.json | tee benchmark_results/nightly-report.txt

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nextgen-nightly-load
          path: |
            nextgen_platform/benchmark_results/nightly-summary.json
            nextgen_platform/benchmark_results/nightly-report.txt

      - name: Shutdown stack
        if: always()
        uses: ./.github/actions/nextgen-stack-down
        with:
          project_dir: nextgen_platform
          compose_file: infra/docker/docker-compose.yml
