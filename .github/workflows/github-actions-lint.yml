name: github-actions-lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/**"
      - ".github/actions/**"

concurrency:
  group: github-actions-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint workflows and actions
        uses: rhysd/actionlint@v1.7.12
