[theme]
base = "dark"
primaryColor = "#0ea5e9"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true
enableStaticServing = false

[runner]
fastReruns = true

[browser]
gatherUsageStats = false

[client]
# FIX pantalla azul (2026-05-14): activado para diagnosticar errores en producción.
# Volver a false cuando el módulo Visitas y Agenda esté estable.
showErrorDetails = true
toolbarMode = "viewer"
