[theme]
base = "dark"
# Paleta sobria tipo panel clinico / enterprise (teal + slate)
primaryColor = "#14b8a6"
backgroundColor = "#0b1020"
secondaryBackgroundColor = "#131b2e"
textColor = "#f1f5f9"

[server]
headless = true
enableStaticServing = false

[runner]
# Menos latencia al interactuar con widgets (Streamlit 1.33+).
fastReruns = true

[browser]
gatherUsageStats = false
