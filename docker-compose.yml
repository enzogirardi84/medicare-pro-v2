# =============================================================================
# docker-compose.yml - MediCare Enterprise PRO
# Produccion: Streamlit + Nginx + cold storage + backups
# =============================================================================

version: "3.9"

services:
  # ── Aplicacion Streamlit ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/enzogirardi84/medicare-pro-v2:latest
    container_name: medicare-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"  # solo local, nginx proxy al frente
    environment:
      - TZ=America/Argentina/Buenos_Aires
      # Supabase (produccion - configurar via .env)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      # Tenant / Cliente
      - MEDICARE_TENANT=${MEDICARE_TENANT:-default}
      - MEDICARE_TENANT_ID=${MEDICARE_TENANT_ID:-0}
      # Seguridad
      - PASSWORD_BCRYPT_ROUNDS=${PASSWORD_BCRYPT_ROUNDS:-12}
      - SESSION_TIMEOUT_MINUTES=${SESSION_TIMEOUT_MINUTES:-480}
      - MAX_LOGIN_ATTEMPTS=${MAX_LOGIN_ATTEMPTS:-5}
      - LOGIN_LOCKOUT_SECONDS=${LOGIN_LOCKOUT_SECONDS:-300}
    volumes:
      # Datos persistentes con montos separados por tenant
      - audit_logs:/app/.audit_logs:ro
      - estudios:/app/storage/estudios:rw
      - backups:/app/backups:rw
      # Configuracion tenant (montado como archivo)
      - ./tenants/${MEDICARE_TENANT:-default}/config.toml:/app/.streamlit/config.toml:ro
      - ./tenants/${MEDICARE_TENANT:-default}/secrets.toml:/app/.streamlit/secrets.toml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/healthz', timeout=5) || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Proxy Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: medicare-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - estudios:/storage/estudios:ro  # solo lectura para servir archivos
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Cold Storage Rotation (cron) ───────────────────────────────
  cold-storage:
    image: alpine:latest
    container_name: medicare-cold-storage
    restart: unless-stopped
    entrypoint: |
      sh -c "
      apk add --no-cache aws-cli
      while true; do
        # Rotar audit logs a cold storage cada hora
        for f in /audit_logs/*.gz; do
          [ -f \"$f\" ] || continue
          aws s3 cp \"$f\" s3://medicare-cold-storage/\$(date +%Y/%m/%d)/ 2>/dev/null || true
          rm -f \"$f\"
        done
        sleep 3600
      done
      "
    volumes:
      - audit_logs:/audit_logs:ro
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=us-east-1

volumes:
  audit_logs:
    driver: local
    driver_opts:
      type: none
      device: /data/medicare/audit_logs
      o: bind
  estudios:
    driver: local
    driver_opts:
      type: none
      device: /data/medicare/estudios
      o: bind
  backups:
    driver: local
    driver_opts:
      type: none
      device: /data/medicare/backups
      o: bind
