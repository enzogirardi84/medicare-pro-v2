version: '3.8'

services:
  medicare_app:
    build: .
    container_name: medicare_enterprise_prod
    ports:
      - "8501:8501"
    environment:
      - MEDICARE_ENV=production
      - MEDICARE_MASTER_CRYPTO_KEY=${MEDICARE_MASTER_CRYPTO_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    volumes:
      - .:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  mock_supabase:
    image: postgres:15-alpine
    container_name: medicare_db_mock
    profiles:
      - test
    environment:
      POSTGRES_DB: medicare_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_segura_local
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data
