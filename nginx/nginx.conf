# Nginx config - MediCare Enterprise PRO
# Proxy inverso para Streamlit + proteccion de archivos

upstream medicare_app {
    server app:8501 fail_timeout=10s;
}

server {
    listen 80;
    server_name medicare-pro.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medicare-pro.local;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Seguridad headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;";

    # Tamanos maximos
    client_max_body_size 25M;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # WebSocket para Streamlit
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Streamlit app
    location / {
        proxy_pass http://medicare_app;
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check (sin proxy)
    location /healthz {
        access_log off;
        return 200 "OK";
    }

    # Bloquear acceso directo a estudios
    location /storage/ {
        internal;
        alias /storage/estudios/;
        add_header Content-Disposition 'attachment';
    }

    # Bloquear acceso a archivos sensibles
    location ~ /\.(git|env|streamlit|audit_logs) {
        deny all;
        return 404;
    }

    location ~ \.(py|toml|md|example)$ {
        deny all;
        return 404;
    }
}
