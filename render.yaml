services:
  - type: web
    name: medicare-enterprise-pro
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
      # URL pública HTTPS sin barra final (canonical, Open Graph). Definir el valor en el panel de Render.
      - key: SITE_URL
        sync: false
