name: medicare_mobile
description: MediCare Pro - App clínica multi-tenancy para Android e iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.3.0
  connectivity_plus: ^6.0.3
  local_auth: ^2.3.0
  intl: ^0.19.0
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.2.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.2
  provider: ^6.1.2
  shimmer: ^3.0.0
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
