apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextgen-api
  namespace: nextgen
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nextgen-api
  template:
    metadata:
      labels:
        app: nextgen-api
    spec:
      containers:
        - name: api
          image: your-registry/nextgen-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nextgen-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: nextgen-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nextgen-secrets
                  key: JWT_SECRET
            - name: OUTBOX_AUTO_FLUSH_ENABLED
              value: "true"
            - name: OUTBOX_AUTO_FLUSH_INTERVAL_SECONDS
              value: "10"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
