services:
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: nextgen_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/medicare_nextgen
      REDIS_URL: redis://redis:6379/0
      OUTBOX_AUTO_FLUSH_ENABLED: "true"
      OUTBOX_AUTO_FLUSH_INTERVAL_SECONDS: "5"
      OUTBOX_FLUSH_BATCH_SIZE: "200"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  db:
    image: postgres:16
    container_name: nextgen_db
    environment:
      POSTGRES_DB: medicare_nextgen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - nextgen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: nextgen_redis
    ports:
      - "6379:6379"

  worker:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    container_name: nextgen_worker
    command: ["celery", "-A", "tasks", "worker", "--loglevel=info", "-Q", "reports", "--concurrency=2", "--prefetch-multiplier=1"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/medicare_nextgen
    depends_on:
      - redis
      - db

  worker_imports:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    container_name: nextgen_worker_imports
    command: ["celery", "-A", "tasks", "worker", "--loglevel=info", "-Q", "imports", "--concurrency=6", "--prefetch-multiplier=1"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/medicare_nextgen
    depends_on:
      - redis
      - db

  worker_events:
    build:
      context: ../../apps/worker
      dockerfile: Dockerfile
    container_name: nextgen_worker_events
    command: ["celery", "-A", "tasks", "worker", "--loglevel=info", "-Q", "events", "--concurrency=4", "--prefetch-multiplier=1"]
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/medicare_nextgen
    depends_on:
      - redis
      - db

  prometheus:
    image: prom/prometheus:latest
    container_name: nextgen_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/rules:/etc/prometheus/rules:ro

  grafana:
    image: grafana/grafana:latest
    container_name: nextgen_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  nextgen_pgdata:
