{{- /*
MediCare Enterprise PRO — API Deployment with HPA, Anti-Affinity, and Custom Probes
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "medicare-pro.fullname" . }}-api
  labels:
    app.kubernetes.io/name: medicare-pro
    app.kubernetes.io/component: api
    app.kubernetes.io/region: {{ .Values.global.region | default "sa-east-1" }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
        app.kubernetes.io/region: {{ .Values.global.region | default "sa-east-1" }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/component
                    operator: In
                    values:
                      - api
              topologyKey: {{ .Values.api.antiAffinity.topologyKey }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - api
                topologyKey: "topology.kubernetes.io/zone"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: api
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
              name: http
          env:
            - name: REGION
              value: {{ .Values.global.region | default "sa-east-1" }}
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: medicare-pro-secrets
                  key: db-url
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: medicare-pro-secrets
                  key: redis-host
            - name: KMS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: medicare-pro-secrets
                  key: kms-key-id
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.probes.liveness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.api.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.api.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.probes.readiness.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.api.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.api.probes.readiness.failureThreshold }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.probes.startup.path }}
              port: 8000
            initialDelaySeconds: {{ .Values.api.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.api.probes.startup.failureThreshold }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "medicare-pro.fullname" . }}-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "medicare-pro.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    {{- toYaml .Values.api.autoscaling.metrics | nindent 4 }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 4
          periodSeconds: 15
        - type: Percent
          value: 100
          periodSeconds: 15
---
{{- if .Values.monitoring.prometheus.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "medicare-pro.fullname" . }}-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.prometheus.serviceMonitor.interval }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "medicare-pro.fullname" . }}-alerts
spec:
  groups:
    - name: medicare-pro
      rules:
        - alert: ApiLatencyHigh
          expr: histogram_quantile(0.95, rate(medicare_api_request_duration_seconds_bucket[5m])) > 0.5
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "API p95 latency > 500ms in {{ "{{ $labels.region }}" }}"
        - alert: WsQueueSaturation
          expr: medicare_ws_queue_depth > 200
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "WebSocket queue depth > 200 in {{ "{{ $labels.region }}" }}"
        - alert: CircuitBreakerOpen
          expr: medicare_circuit_breaker_state{state="open"} > 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Circuit breaker OPEN for service {{ "{{ $labels.service }}" }}"
{{- end }}
